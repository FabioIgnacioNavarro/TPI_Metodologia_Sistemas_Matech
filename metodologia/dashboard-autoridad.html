<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Autoridad</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <h2>Educar+</h2>
            <nav class="sidebar-nav">
                <a href="#">Inicio</a>
                <a href="#">Docentes</a>
                <a href="#">Reportes</a>
                <a href="#">Institución</a>
            </nav>
        </aside>
        <main class="dashboard-main">
            <header class="dashboard-header">
                <h1>Panel de Autoridad</h1>
            </header>
            <section class="cards-grid">
                <div class="dashboard-card">
                    <h3>Estudiantes</h3>
                    <p>842</p>
                </div>
                <div class="dashboard-card">
                    <h3>Docentes</h3>
                    <p>67</p>
                </div>
                <div class="dashboard-card">
                    <h3>Promedio institucional</h3>
                    <p>8.1</p>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
